services:
  postgres:
    image: postgres:15
    env:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 87654321
      POSTGRES_DB: test_db
    ports:
      - 5432:5432
    options: >-
      --health-cmd="pg_isready -U postgres -d test_db"
      --health-interval=10s
      --health-timeout=5s
      --health-retries=5
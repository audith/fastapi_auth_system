version: "3"

services:

  db:
    image: postgres
    env_file: .env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./  # point to root folder if Dockerfile handles both frontend+backend
    depends_on:
      - db
    env_file: .env
    ports:
      - "5000:5000"  # matches FastAPI port in Dockerfile
    volumes:
      - ./backend:/app/backend  # optional, for live code updates during dev

volumes:
  pgdata: